<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏠 知識小學堂：健康築夢師 2.0</title>
    <style>
        :root {
            --sky: #A1C4FD;
            --grass: #81C784;
            --house: #FF7043;
            --monster: #9C27B0;
            --board: #2C3E50;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--sky); overflow: hidden; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }

        canvas { display: block; cursor: crosshair; }

        /* UI 層次 */
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        .screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 500px; padding: 30px; background: rgba(255, 255, 255, 0.98);
            border-radius: 40px; text-align: center; display: none; pointer-events: auto;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15); border: 8px solid #fff;
        }
        .screen.active { display: block; animation: bounceIn 0.5s ease; }
        @keyframes bounceIn { from { transform: translate(-50%, -50%) scale(0.7); opacity: 0; } }

        /* 題目彈窗 */
        #quiz-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 92%; max-width: 550px; background: var(--board); color: #fff; padding: 25px;
            border-radius: 20px; border: 4px solid #fff; text-align: center; z-index: 200;
            display: none; pointer-events: auto; box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }

        .opt-btn {
            width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px;
            font-size: 1.1em; font-weight: bold; cursor: pointer; background: #fff; color: var(--board); transition: 0.1s;
        }
        .opt-btn:active { background: #E0F2F1; transform: scale(0.98); }

        #hud { position: absolute; bottom: 130px; width: 100%; padding: 0 25px; display: flex; justify-content: space-between; font-weight: 900; color: #2C3E50; pointer-events: none; z-index: 50; }

        .btn { width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 50px; font-size: 1.2em; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-theme { background: #4DB6AC; box-shadow: 0 6px 0 #00897B; }
        .btn-start { background: var(--house); box-shadow: 0 6px 0 #E64A19; }

        .tutorial-item { text-align: left; background: #FDF2E9; padding: 12px; border-radius: 15px; margin: 10px 0; font-size: 0.9em; border-left: 5px solid var(--house); }
        .review-card { text-align: left; background: #fdfcfb; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 6px solid var(--house); font-size: 0.85em; }
    </style>
</head>
<body>

<div id="quiz-overlay">
    <h3 id="q-text">讀取題目中...</h3>
    <div id="options-container"></div>
</div>

<div id="hud" style="display: none;">
    <div>🏠 城市規模: <span id="house-count">0</span>/5</div>
    <div style="color: var(--monster);">👾 迷思怪獸入侵中</div>
</div>

<div class="ui-layer">
    <div id="menu-screen" class="screen active">
        <h1 style="color: #FF6B6B;">🏫 知識小學堂</h1>
        <p><strong>🏗️ 健康城市築夢計畫</strong></p>
        <p>請選擇您的防衛主題：</p>
        <button class="btn btn-theme" onclick="prepareTutorial('chronic')">🛡️ 慢性病防護任務</button>
        <button class="btn btn-theme" onclick="prepareTutorial('diet')">🥗 健康飲食大賽</button>
    </div>

    <div id="tutorial-screen" class="screen">
        <h2 style="color: var(--house);">📜 任務簡報</h2>
        <div class="tutorial-item">🎈 <b>點擊彩色氣球：</b>會跳出題目，答對即可建設一間房子。</div>
        <div class="tutorial-item">👾 <b>阻止降落怪獸：</b>怪獸會從上方垂直落下。若點擊並答對題目可擊退牠；若落地則會拆掉房子！</div>
        <div class="tutorial-item">🏆 <b>勝利條件：</b>在 10 題內蓋滿 5 間房。</div>
        <button class="btn btn-start" onclick="startGame()">啟動系統 🚀</button>
    </div>

    <div id="end-screen" class="screen">
        <h1 id="result-title"></h1>
        <p>最終城市保存數：<span id="final-houses" style="font-size: 2.2em; color: var(--house);">0</span></p>
        <div id="review-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px; text-align: left;"></div>
        <button class="btn btn-start" onclick="location.reload()">重新挑戰 🔄</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    // --- 專業音效與音樂合成引擎 ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let bgmTimer;
    function playSound(f, t, d, v=0.1) {
        const o=audioCtx.createOscillator(); const g=audioCtx.createGain();
        o.type=t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime+d);
    }
    function startBGM() {
        let s=0; const m=[261, 329, 392, 523];
        bgmTimer = setInterval(() => { if(gameActive && !quizMode) { playSound(m[s%4], 'sine', 0.5, 0.02); s++; } }, 400);
    }

    // --- 題庫 ---
    const DB_CHRONIC = [
        { q: "代謝症候群判定指標，男腰圍應？", opts: ["小於 90cm", "越寬越有福氣", "大於 100cm", "只要體重輕"], ans: 0, exp: "男≧90, 女≧80cm 為指標。"},
        { q: "糖尿病患者哪種飲食原則正確？", opts: ["優先選低GI食物", "絕對不吃澱粉", "多吃精緻澱粉", "只喝果汁代水"], ans: 0, exp: "低GI食物消化慢，血糖波動小。"},
        { q: "預防高血壓，鈉每日建議上限？", opts: ["低於2400mg", "不需限制鹽分", "高於5000mg", "多吃醬料沒關係"], ans: 0, exp: "2400mg鈉約為6g鹽，保護心血管。"},
        { q: "血壓低於多少 mmHg 為正常？", opts: ["120/80 以下", "140/90 左右", "只要不頭痛就正常", "160/100 以上"], ans: 0, exp: "維持 120/80 以下是預防中風的關鍵。"},
        { q: "關於腎臟病，哪項行為較佳？", opts: ["不亂吃止痛成藥", "渴了才喝水", "多喝運動飲料", "每天吃沾醬肉類"], ans: 0, exp: "亂服藥物會嚴重加重腎臟負擔。"}
    ];
    const DB_DIET = [
        { q: "『85210』中的 0 代表什麼？", opts: ["0含糖飲料", "0運動量", "0睡覺時間", "不吃早餐"], ans: 0, exp: "水是最好的補水來源，遠離糖分。" },
        { q: "天天攝取多少蔬果才正確？", opts: ["3份蔬菜2份水果", "5份全吃肉", "全喝果汁取代", "只吃水果不吃菜"], ans: 0, exp: "3蔬2果能確保纖維與植化素攝取。" },
        { q: "『85210』中的 8 是代表？", opts: ["睡足8小時", "喝8杯珍奶", "看電視8小時", "走8步路"], ans: 0, exp: "充足睡眠是修復代謝的基礎。" },
        { q: "我的餐盤中，水果份量建議？", opts: ["每餐一個拳頭大", "一整顆大西瓜", "完全不吃", "10粒葡萄"], ans: 0, exp: "拳頭大小能控制糖分攝取量。" },
        { q: "1 是代表每天活動多久？", opts: ["累積 60 分鐘", "只要 1 分鐘", "休息 1 小時", "看書 1 小時"], ans: 0, exp: "1 代表每天累積一小時活動。" }
    ];

    // --- 系統變數 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let gameActive = false, quizMode = false, houseCount = 0;
    let activeDB = [], balloons = [], monsters = [], mistakes = [];
    const balloonColors = ['#B2EBF2', '#FFCCBC', '#FFF9C4', '#E1BEE7'];

    function prepareTutorial(theme) {
        activeDB = theme==='chronic'?DB_CHRONIC:DB_DIET;
        document.getElementById('menu-screen').classList.remove('active');
        document.getElementById('tutorial-screen').classList.add('active');
    }

    function startGame() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('tutorial-screen').classList.remove('active');
        document.getElementById('hud').style.display = 'flex';
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        gameActive = true; houseCount = 0; mistakes = [];
        startBGM(); requestAnimationFrame(loop);
        spawnItems();
    }

    function spawnItems() {
        if(!gameActive) return;
        if(!quizMode) {
            // 氣球
            if(Math.random() < 0.05) balloons.push({ x: Math.random()*(canvas.width-100)+50, y: canvas.height+50, r: 45, c: balloonColors[Math.floor(Math.random()*4)], s: 1.4 });
            // 怪獸
            if(Math.random() < 0.012) monsters.push({ x: Math.random()*(canvas.width-100)+50, y: -50, r: 40, s: 1.1 });
        }
        setTimeout(spawnItems, 100);
    }

    function loop() {
        if (!gameActive) return;
        if (!quizMode) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 畫地與房
            ctx.fillStyle = "#90EE90"; ctx.fillRect(0, canvas.height-110, canvas.width, 110);
            for(let i=0; i<houseCount; i++) drawHouse(20+i*70, canvas.height-110);

            // 更新氣球 (純垂直不晃動)
            for(let i=balloons.length-1; i>=0; i--) {
                balloons[i].y -= balloons[i].s; drawBalloon(balloons[i]);
                if(balloons[i].y < -100) balloons.splice(i, 1);
            }

            // 更新怪獸 (純垂直不晃動)
            for(let i=monsters.length-1; i>=0; i--) {
                monsters[i].y += monsters[i].s; drawMonster(monsters[i]);
                if(monsters[i].y > canvas.height-130) {
                    monsters.splice(i, 1);
                    if(houseCount > 0) houseCount--;
                    playSound(110, 'sawtooth', 0.5);
                }
            }
        }
        requestAnimationFrame(loop);
    }

    function drawBalloon(b) {
        ctx.save(); ctx.translate(b.x, b.y);
        ctx.fillStyle = b.c; ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.stroke();
        ctx.restore();
    }

    function drawMonster(m) {
        ctx.fillStyle = varColor('--monster');
        ctx.beginPath(); ctx.moveTo(m.x, m.y-m.r); ctx.lineTo(m.x+m.r, m.y+m.r); ctx.lineTo(m.x-m.r, m.y+m.r); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.fillRect(m.x-10, m.y, 5, 5); ctx.fillRect(m.x+5, m.y, 5, 5);
    }

    function drawHouse(x, y) {
        ctx.fillStyle = varColor('--house'); ctx.fillRect(x, y-40, 50, 40);
        ctx.fillStyle = "#D84315"; ctx.beginPath(); ctx.moveTo(x-5, y-40); ctx.lineTo(x+25, y-65); ctx.lineTo(x+55, y-40); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.fillRect(x+15, y-20, 20, 20);
    }

    function handleInteraction(ex, ey) {
        if(!gameActive || quizMode) return;
        for(let i=0; i<monsters.length; i++) {
            if(Math.hypot(ex-monsters[i].x, ey-monsters[i].y) < 60) { showQuiz(monsters[i], 'monster', i); return; }
        }
        for(let i=0; i<balloons.length; i++) {
            if(Math.hypot(ex-balloons[i].x, ey-balloons[i].y) < 60) { showQuiz(balloons[i], 'balloon', i); return; }
        }
    }

    function showQuiz(obj, type, idx) {
        quizMode = true;
        const qData = activeDB[Math.floor(Math.random()*activeDB.length)];
        const overlay = document.getElementById('quiz-overlay');
        overlay.style.display = 'block';
        document.getElementById('q-text').innerText = qData.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        qData.opts.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn'; b.innerText = o;
            b.onclick = () => {
                if(i === qData.ans) {
                    houseCount++; playSound(523, 'sine', 0.2);
                } else {
                    if(houseCount > 0) houseCount--;
                    mistakes.push(qData); playSound(110, 'sawtooth', 0.4);
                }
                overlay.style.display = 'none';
                quizMode = false;
                if(type==='monster') monsters.splice(idx, 1);
                else balloons.splice(idx, 1);
                document.getElementById('house-count').innerText = houseCount;
                if(houseCount >= 5) endGame(true);
            };
            container.appendChild(b);
        });
    }

    canvas.addEventListener('mousedown', e => handleInteraction(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => { e.preventDefault(); handleInteraction(e.touches[0].clientX, e.touches[0].clientY); });

    function varColor(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

    function endGame(win) {
        gameActive = false; quizMode = false; clearInterval(bgmTimer);
        document.getElementById('quiz-overlay').style.display = 'none';
        document.getElementById('hud').style.display = 'none';
        const t = document.getElementById('result-title');
        t.innerText = win ? "🏆 築夢成功！健康守護者" : "🚧 城市受損，再接再厲";
        document.getElementById('final-houses').innerText = houseCount;
        const list = document.getElementById('review-list');
        list.innerHTML = '<h3>📝 複習筆記：</h3>';
        [...new Set(mistakes)].forEach(m => {
            const d = document.createElement('div'); d.className='review-card';
            d.innerHTML = `<strong>Q: ${m.q}</strong><br>✅ 正解：${m.opts[m.ans]}<br>💡 解析：${m.exp}`;
            list.appendChild(d);
        });
        document.getElementById('end-screen').classList.add('active');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 健康知識挑戰賽 🌟</title>
    <style>
        :root {
            --primary: #FF7E67;
            --secondary: #6B5B95;
            --bg-color: #F9F9F9;
            --text-color: #333;
            --correct: #4CAF50;
            --wrong: #F44336;
            --evidence-bg: #E8F5E9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, '微軟正黑體';
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(#FFD3B6 10%, transparent 10%), radial-gradient(#FFD3B6 10%, transparent 10%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }

        .app-container {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            padding: 30px;
            position: relative;
        }

        .screen {
            display: none;
            animation: fadeIn 0.5s;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2 {
            color: var(--secondary);
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1em;
            line-height: 1.6;
        }

        /* 按鈕設計 */
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
            font-weight: bold;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 126, 103, 0.4);
        }

        /* 答題區設計 */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            background-color: white;
            border: 2px solid var(--secondary);
            color: var(--secondary);
            padding: 15px;
            border-radius: 15px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .option-btn:hover {
            background-color: var(--secondary);
            color: white;
        }

        .option-btn.correct {
            background-color: var(--correct);
            border-color: var(--correct);
            color: white;
        }

        .option-btn.wrong {
            background-color: var(--wrong);
            border-color: var(--wrong);
            color: white;
        }

        /* 錯題回顧設計 */
        .review-card {
            background-color: #FFF3E0;
            border-left: 5px solid var(--primary);
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
            border-radius: 0 10px 10px 0;
        }

        .review-card .question {
            font-weight: bold;
            color: var(--secondary);
            font-size: 1.1em;
        }

        .review-card .explanation {
            margin-top: 10px;
            font-size: 0.95em;
            color: #444;
        }
        
        .review-card .evidence {
            margin-top: 8px;
            padding: 8px;
            background-color: var(--evidence-bg);
            border-radius: 8px;
            font-size: 0.9em;
            color: #2E7D32;
            border-left: 3px solid #4CAF50;
        }

        #progress {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="start-screen" class="screen active">
        <h1>🏃‍♂️ 健康知識挑戰賽 🍎</h1>
        <p>準備好測試你的健康力了嗎？<br>讓我們看看你對「85210」策略有多了解！</p>
        <button class="btn" onclick="startGame()">開始挑戰 🚀</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="progress">題目 1 / 3</div>
        <h2 id="question-text">題目文字會在這裡</h2>
        <div class="options-container" id="options-container">
            </div>
    </div>

    <div id="result-screen" class="screen">
        <h1>🎉 挑戰完成！</h1>
        <p>你的得分是：<span id="score-display" style="font-size: 2.5em; font-weight: bold; color: var(--primary);">0</span> / 100</p>
        <div id="result-message"></div>
        <button class="btn" id="review-btn" onclick="showReview()">查看錯誤與實證解析 💡</button>
        <button class="btn" style="background-color: var(--secondary); margin-top: 10px;" onclick="restartGame()">再玩一次 🔄</button>
    </div>

    <div id="review-screen" class="screen">
        <h2>📝 錯題與實證筆記</h2>
        <div id="review-container">
            </div>
        <button class="btn" onclick="restartGame()">重新挑戰 🚀</button>
    </div>
</div>

<script>
    const quizData = [
        {
            question: "關於「85210」健康密碼，其中的「8」代表什麼？",
            options: ["每天喝8杯水", "每天睡足8小時", "每天走8000步", "每天看書80分鐘"],
            answer: 1, 
            explanation: "「8」代表每天要睡足 8 小時！充足的睡眠有助於大腦休息與促進生長發育。",
            evidence: "實證研究指出：睡眠不足會干擾內分泌系統，導致瘦素分泌減少、飢餓素增加，進而提高學童兒童期肥胖的風險。"
        },
        {
            question: "「85210」中的「5」是指每天要吃幾份蔬果？",
            options: ["3份蔬菜2份水果", "5份都是蔬菜", "隨便挑5種顏色的食物", "5份都是水果"],
            answer: 0,
            explanation: "「5」代表天天 5 蔬果（3 份蔬菜 + 2 份水果），提供豐富維生素和膳食纖維。",
            evidence: "實證研究指出：充足的膳食纖維能促進腸道蠕動，改變腸道菌相，有效預防便秘並降低慢性疾病的發生率。"
        },
        {
            question: "為了保護眼睛和維持健康，每天觀看螢幕（手機、電腦）的時間「2」應該限制在多久以內？",
            options: ["20分鐘", "2小時", "200分鐘", "只要休息2次就好"],
            answer: 1,
            explanation: "「2」代表觀看 3C 螢幕的時間每天少於 2 小時。看太久容易造成視力受損。",
            evidence: "實證研究指出：長時間久坐觀看螢幕會排擠身體活動量（Physical Activity），是導致學童體適能下降與過重的重要獨立危險因子。"
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let incorrectAnswers = []; 
    const scorePerQuestion = Math.round(100 / quizData.length);

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(screen => {
            screen.classList.remove('active');
        });
        document.getElementById(screenId).classList.add('active');
    }

    function startGame() {
        currentQuestionIndex = 0;
        score = 0;
        incorrectAnswers = [];
        loadQuestion();
        showScreen('quiz-screen');
    }

    function loadQuestion() {
        const currentQuiz = quizData[currentQuestionIndex];
        document.getElementById('progress').innerText = `題目 ${currentQuestionIndex + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = currentQuiz.question;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = ''; 

        currentQuiz.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.innerText = option;
            button.classList.add('option-btn');
            button.onclick = () => checkAnswer(index, button);
            optionsContainer.appendChild(button);
        });
    }

    function checkAnswer(selectedIndex, buttonElement) {
        const allButtons = document.querySelectorAll('.option-btn');
        allButtons.forEach(btn => btn.style.pointerEvents = 'none');

        const currentQuiz = quizData[currentQuestionIndex];

        if (selectedIndex === currentQuiz.answer) {
            buttonElement.classList.add('correct');
            score += scorePerQuestion;
        } else {
            buttonElement.classList.add('wrong');
            allButtons[currentQuiz.answer].classList.add('correct');
            incorrectAnswers.push(currentQuiz);
        }

        if(currentQuestionIndex === quizData.length - 1 && score > 90) score = 100;

        setTimeout(() => {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 1200);
    }

    function showResults() {
        document.getElementById('score-display').innerText = score;
        const msgElement = document.getElementById('result-message');
        const reviewBtn = document.getElementById('review-btn');

        if (score === 100) {
            msgElement.innerHTML = "<h3>太棒了！你是健康知識大師 🏆</h3><p>你完全掌握了健康密碼！</p>";
            reviewBtn.style.display = 'none'; 
        } else {
            msgElement.innerHTML = "<h3>做得很棒！但還有進步空間喔 💪</h3><p>來看看哪些概念還可以再加強吧！</p>";
            reviewBtn.style.display = 'block';
        }

        showScreen('result-screen');
    }

    function showReview() {
        const reviewContainer = document.getElementById('review-container');
        reviewContainer.innerHTML = ''; 

        incorrectAnswers.forEach((item) => {
            const card = document.createElement('div');
            card.classList.add('review-card');
            
            card.innerHTML = `
                <div class="question">Q: ${item.question}</div>
                <div style="color: var(--wrong); margin-top: 5px;">❌ 你的答案答錯了</div>
                <div style="color: var(--correct); margin-top: 5px; font-weight: bold;">✅ 正確答案：${item.options[item.answer]}</div>
                <div class="explanation">💡 <b>解析：</b>${item.explanation}</div>
                <div class="evidence">🔍 <b>背後實證：</b>${item.evidence}</div>
            `;
            reviewContainer.appendChild(card);
        });

        showScreen('review-screen');
    }

    function restartGame() {
        showScreen('start-screen');
    }
</script>

</body>
</html>
